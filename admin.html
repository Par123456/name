<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Control System</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .admin-form input, .admin-form textarea {
            width: 100%; padding: 10px; margin-bottom: 15px;
            background: #111; border: 1px solid #0f0; color: #0f0;
            font-family: 'Courier New', Courier, monospace;
        }
        .admin-form label { color: #ff0; display: block; margin-bottom: 5px; }
        .btn-save {
            background: #0f0; color: #000; border: none; padding: 10px 20px;
            cursor: pointer; font-weight: bold; width: 100%;
        }
        .btn-save:hover { background: #0c0; }
        .array-input { display: flex; gap: 10px; margin-bottom: 10px; }
        .array-input input { flex: 1; margin: 0; }
        .btn-add { background: #00f; color: #fff; border: none; padding: 0 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 800px;">
        <header>
            <h1 class="glitch" data-text="ADMIN CONTROL">ADMIN CONTROL</h1>
            <p class="subtitle">// AUTHORIZED ACCESS ONLY //</p>
        </header>

        <main class="terminal-box">
            <div class="terminal-header">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
                <span class="terminal-title">update_payload.sh</span>
            </div>
            <div class="terminal-body">
                <form class="admin-form" id="dataForm">
                    <label>رمز عبور ادمین (Admin Password):</label>
                    <input type="password" id="password" placeholder="رمز خود را وارد کنید">

                    <label>نام (Name):</label>
                    <input type="text" id="name" placeholder="مثلا: امیرعلی">

                    <label>نام مستعار (Alias):</label>
                    <input type="text" id="alias" placeholder="مثلا: نیملس">

                    <label>شماره موبایل (Mobile):</label>
                    <input type="text" id="mobile" placeholder="09xxx">

                    <label>شماره منزل (Home):</label>
                    <input type="text" id="home" placeholder="0xx">

                    <label>توضیحات (Description):</label>
                    <textarea id="description" rows="4" placeholder="توضیحات کامل..."></textarea>

                    <label>آدرس عکس‌ها (هر خط یک آدرس):</label>
                    <textarea id="images" rows="3" placeholder="/images/img1.jpg"></textarea>

                    <label>آدرس ویدیوها (هر خط یک آدرس):</label>
                    <textarea id="videos" rows="3" placeholder="/videos/vid1.mp4"></textarea>

                    <label>آدرس گیف‌ها (هر خط یک آدرس):</label>
                    <textarea id="gifs" rows="3" placeholder="/images/gif1.gif"></textarea>

                    <button type="submit" class="btn-save">EXECUTE SAVE (ذخیره و بروزرسانی)</button>
                </form>
                <div id="status-msg" style="margin-top: 15px; color: #0f0;"></div>
            </div>
        </main>
    </div>

    <script src="/js/admin.js"></script>
</body>
</html>
